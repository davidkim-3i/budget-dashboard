<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3i 예산 결산 대시보드 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#080b12;--bg2:#0e1320;--surface:#121828;--surface2:#182036;--border:#1e2a40;--border2:#263450;--accent:#3b82f6;--accent2:#6366f1;--teal:#14b8a6;--green:#22c55e;--yellow:#eab308;--orange:#f97316;--red:#ef4444;--text:#f0f4ff;--text2:#7e8fb5;--text3:#3d4f72;--mono:'JetBrains Mono','Courier New',monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:13px;min-height:100vh}
#screen-connect{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 16px;background:radial-gradient(ellipse 80% 50% at 50% 0%,rgba(59,130,246,.08) 0%,transparent 70%)}
.c-logo{display:flex;align-items:center;gap:12px;margin-bottom:32px}
.c-logo-icon{width:46px;height:46px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:22px}
.c-logo-text{font-size:21px;font-weight:800;letter-spacing:-.5px}.c-logo-sub{font-size:12px;color:var(--text2)}
.c-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:38px 44px;width:100%;max-width:560px}
.c-card h2{font-size:19px;font-weight:700;margin-bottom:6px}.c-card>p{color:var(--text2);font-size:13px;line-height:1.65;margin-bottom:22px}
.c-label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;display:block;margin-bottom:5px}
.c-input{width:100%;background:var(--surface2);border:1px solid var(--border2);color:var(--text);padding:11px 14px;border-radius:9px;font-size:12px;font-family:var(--mono);outline:none;transition:border-color .2s;margin-bottom:8px}
.c-input:focus{border-color:var(--accent)}.c-input::placeholder{color:var(--text3);font-family:'Pretendard',sans-serif}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all .15s}
.btn-p{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;width:100%;justify-content:center;padding:12px}.btn-p:hover{opacity:.88}
.btn-g{background:var(--surface2);border:1px solid var(--border2);color:var(--text2);font-size:12px;padding:8px 16px;margin-top:8px}.btn-g:hover{color:var(--text);border-color:var(--accent)}
#c-error{color:var(--red);font-size:12px;min-height:16px;margin-bottom:8px}
.c-hint{margin-top:18px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:13px 15px;font-size:12px;color:var(--text2);line-height:1.7}.c-hint strong{color:var(--text)}
.c-steps{margin-top:20px}.c-steps-t{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:10px}
.c-step{display:flex;gap:10px;margin-bottom:8px;align-items:flex-start}
.c-step-n{width:18px;height:18px;min-width:18px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center}
.c-step-t{font-size:12px;color:var(--text2);line-height:1.6}.c-step-t strong{color:var(--text)}.c-step-t a{color:var(--accent)}
#screen-loading{display:none;min-height:100vh;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.spinner{width:40px;height:40px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-msg{color:var(--text2);font-size:13px}
header{display:none;position:sticky;top:0;z-index:200;background:rgba(8,11,18,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 28px;height:54px;align-items:center;justify-content:space-between}
.h-left{display:flex;align-items:center;gap:10px}
.h-icon{width:28px;height:28px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px}
.h-title{font-size:15px;font-weight:800;color:#ffffff}.h-right{display:flex;align-items:center;gap:8px}
.sync-badge{display:flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border2);padding:5px 11px;border-radius:20px;font-size:12px;color:var(--text)}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.h-btn{background:var(--surface2);border:1px solid var(--border2);color:var(--text2);padding:6px 13px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}.h-btn:hover{color:var(--text);border-color:var(--accent)}
#screen-dashboard{display:none;padding:22px 26px 40px}
.alerts{display:flex;flex-direction:column;gap:6px;margin-bottom:18px}
.alert{display:flex;align-items:center;gap:10px;padding:11px 16px;border-radius:9px;font-size:14px;animation:sIn .3s ease}
@keyframes sIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
.a-over{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.2);border-left:3px solid var(--red)}
.a-sos{background:rgba(249,115,22,.06);border:1px solid rgba(249,115,22,.18);border-left:3px solid var(--orange)}
.a-warn{background:rgba(234,179,8,.05);border:1px solid rgba(234,179,8,.16);border-left:3px solid var(--yellow)}
.a-team{font-weight:700}.a-over .a-team{color:var(--red)}.a-sos .a-team{color:var(--orange)}.a-warn .a-team{color:var(--yellow)}
.top-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.view-tabs{display:flex;gap:3px;background:var(--surface2);padding:3px;border-radius:9px;border:1px solid var(--border)}
.vt{padding:7px 16px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;color:var(--text2);border:none;background:transparent;font-family:inherit;transition:all .15s;white-space:nowrap}
.vt.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}.vt:hover:not(.active){color:var(--text);background:var(--border)}
select{background:var(--surface2);border:1px solid var(--border2);color:var(--text);padding:7px 11px;border-radius:7px;font-size:13px;font-family:inherit;cursor:pointer;outline:none;transition:border-color .15s}
select:hover,select:focus{border-color:var(--accent)}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:11px;margin-bottom:18px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:18px 20px;position:relative;overflow:hidden;transition:border-color .2s,transform .15s}.kpi:hover{border-color:var(--accent);transform:translateY(-1px)}
.kpi::after{content:'';position:absolute;top:0;right:0;width:3px;height:100%;border-radius:0 13px 13px 0}
.kb::after{background:var(--accent)}.ki::after{background:var(--accent2)}.kt::after{background:var(--teal)}.kg::after{background:var(--green)}.ky::after{background:var(--yellow)}.kr::after{background:var(--red)}
.kpi-l{font-size:13px;text-transform:uppercase;letter-spacing:.4px;color:var(--text);font-weight:600;margin-bottom:7px}
.kpi-v{font-size:22px;font-weight:800;font-family:var(--mono);letter-spacing:-1px;line-height:1}
.kpi-s{font-size:12px;color:var(--text2);margin-top:4px}
.kpi-b{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:20px;font-size:12px;font-weight:700;margin-top:4px}
.b-ok{background:rgba(34,197,94,.12);color:var(--green)}.b-w{background:rgba(234,179,8,.12);color:var(--yellow)}.b-s{background:rgba(249,115,22,.12);color:var(--orange)}.b-o{background:rgba(239,68,68,.12);color:var(--red)}
.cg2{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:13px}
.cg3{display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:13px;margin-bottom:13px}
.cc{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:17px 19px}.cc.s2{grid-column:span 2}
.ct{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text2);margin-bottom:13px;display:flex;align-items:center;gap:6px}.ct em{color:#ffffff;font-style:normal;font-weight:700}
.cw{position:relative}.h220{height:220px}.h260{height:260px}.h300{height:300px}
.sec-t{font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);margin:18px 0 11px;display:flex;align-items:center;gap:8px}
.sec-t::after{content:'';flex:1;height:1px;background:var(--border)}
.tw{overflow-x:auto}
table.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{background:var(--surface2);color:var(--text2);padding:8px 11px;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;text-align:right;white-space:nowrap;border-bottom:1px solid var(--border)}
.tbl th:first-child{text-align:left}
.tbl td{padding:8px 11px;border-bottom:1px solid var(--border);text-align:right;font-family:var(--mono);white-space:nowrap}
.tbl td:first-child{text-align:left;font-family:'Pretendard',sans-serif;font-weight:500}
.tbl tr:hover td{background:rgba(59,130,246,.03)}
.tbl tr.ro td{background:rgba(239,68,68,.04)}.tbl tr.ro td:first-child{border-left:2px solid var(--red);padding-left:9px}
.tbl tr.rs td{background:rgba(249,115,22,.04)}.tbl tr.rs td:first-child{border-left:2px solid var(--orange);padding-left:9px}
.tbl tr.rw td{background:rgba(234,179,8,.03)}.tbl tr.rw td:first-child{border-left:2px solid var(--yellow);padding-left:9px}
.pc{display:flex;align-items:center;gap:6px;justify-content:flex-end}
.pb{width:60px;height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;flex-shrink:0}.pf{height:100%;border-radius:2px}.pn{font-size:12px;min-width:38px;text-align:right}
.co{color:var(--green)}.cw2{color:var(--yellow)}.cs{color:var(--orange)}.cv{color:var(--red)}.cp{color:var(--green)}.cn{color:var(--red)}
footer{text-align:center;padding:16px;color:var(--text3);font-size:11px;border-top:1px solid var(--border);margin-top:20px}
@media(max-width:860px){.cg2,.cg3{grid-template-columns:1fr}.cc.s2{grid-column:span 1}#screen-dashboard{padding:14px}header{padding:0 14px}}
</style>
<script src="https://accounts.google.com/gsi/client" async defer onload="onGsiLoad()"></script>
</head>

function parseJwt(token){
  try{ return JSON.parse(atob(token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/'))); }
  catch(e){ return null; }
}

  API_KEY = 'AIzaSyA80iNrDYCPrcj-EoC2OqkG8fch-o56K2E';

  showLoading('사용자 정보를 확인하는 중...');

  // 직원 매핑 탭에서 부서 조회
  const dept = await fetchUserDept(email);

async function fetchUserDept(email){
  try{
    const url = \`https://sheets.googleapis.com/v4/spreadsheets/\${SHEET_ID}/values/\${encodeURIComponent("'"+MAPPING_TAB+"'")}?key=\${API_KEY}\`;
    const res = await fetch(url);
    const json = await res.json();
    const rows = json.values || [];
    for(let i=1; i<rows.length; i++){
      const row = rows[i];
      // C열(인덱스2)이 이메일, B열(인덱스1)이 부서, E열(인덱스4)이 권한
      if(row[2] && row[2].trim().toLowerCase() === email.toLowerCase()){
        if(row[4] && row[4].trim() === 'admin') return '전체관리자';
        return row[1] ? row[1].trim() : null;
      }
    }
    return null; // 매핑 없으면 null (전체관리자로 처리 또는 접근 제한)
  }catch(e){ return null; }
}

async function loadData(){
  showLoading('종합 시트에서 데이터를 불러오는 중...');
  const err=document.getElementById('c-error');
  const allRows=[];
  const total=DEPT_TABS.length;
  let loaded=0;

  const results=await Promise.allSettled(
    DEPT_TABS.map(async tabName=>{
      const encoded=encodeURIComponent("'"+tabName+"'");
      const url=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encoded}?key=${API_KEY}`;
      const res=await fetch(url, {mode:'cors', cache:'no-cache'});
      if(!res.ok){const j=await res.json().catch(()=>({}));throw new Error(`${tabName}: ${j?.error?.message||'HTTP '+res.status}`)}
      const json=await res.json();
      loaded++;
      document.getElementById('loading-msg').textContent=`데이터 로딩 중... (${loaded}/${total}) ${TAB_TO_DEPT[tabName]}`;
      return{tab:tabName,values:json.values||[]};
    })
  );

  for(const r of results){
    if(r.status==='rejected'){console.warn(r.reason);continue}
    const rows=parseTab(r.value.values,TAB_TO_DEPT[r.value.tab]);
    allRows.push(...rows);
  }

  if(allRows.length===0){
    showConnect();
    const err2=document.getElementById('c-error');
    if(err2) err2.textContent='❌ 데이터가 없습니다. API 키 또는 시트 공유 설정을 확인하세요.';
    return;
  }

  // 부서 필터링: admin은 전체, user는 본인 부서만
  if(USER && USER.role !== 'admin' && USER.dept){
    RAW = allRows.filter(r => r.부서 === USER.dept);
  } else {
    RAW = allRows;
  }

  // 헤더 사용자 정보 표시
  if(USER){
    const badge = document.getElementById('user-badge');
    if(badge){ badge.style.display='flex'; }
    const pic = document.getElementById('user-pic');
    if(pic && USER.picture) pic.src = USER.picture;
    const nameEl = document.getElementById('user-name');
    if(nameEl) nameEl.textContent = USER.name;
    const deptEl = document.getElementById('user-dept-badge');
    if(deptEl) deptEl.textContent = USER.role==='admin' ? '관리자' : (USER.dept||'알 수 없음');
  }

  initDash();
}

// ══ PARSE ════════════════════════════════════════
// import 탭 구조: 행4=헤더(지출종류 | N월 지출 plan | N월 지출 결과 | 비고 | ...)
// 행7~: 지출종류별 데이터
function parseTab(values,deptName){
  if(!values||values.length<5)return[];

  // 헤더 행 찾기: 'Expense Type' 셀이 정확히 일치 + 같은 행에 'Month'도 있어야 진짜 헤더
  // (FN Clara처럼 행1에 유사 문자열이 있어도 오감지 방지)
  let hi=-1;
  for(let i=0;i<Math.min(10,values.length);i++){
    const r=values[i];
    if(!r)continue;
    if(r.some(c=>{const s=String(c||'').trim().toLowerCase();return s==='expense type'||s==='지출종류';})){
      if(r.some(c=>{const s=String(c||'').trim().toLowerCase();return s==='month'||s==='월'||s.includes('planned expense')||s.includes('지출예정');})){
        hi=i;break;
      }
    }
  }
  if(hi<0)return[];

  const headers=values[hi].map(c=>String(c||'').trim().toLowerCase());

  // 핵심 컬럼 인덱스
  const iMonth  = headers.findIndex(h=>h==='month'||h==='월');
  const iType   = headers.findIndex(h=>h==='expense type'||h==='지출종류');
  const iEntity = headers.findIndex(h=>h==='paying entity'||h==='지출법인');
  const iVendor = headers.findIndex(h=>h==='vendor'||h==='거래처');
  const iPlan   = headers.findIndex(h=>h==='planned amount (krw)'||h==='예정 원화환산액');
  const iActual = headers.findIndex(h=>h==='actual amount (krw)'||h==='결과 원화환산액'||h==='지출 원화환산액');

  if(iType<0||(iPlan<0&&iActual<0))return[];

  const rows=[];
  for(let i=hi+1;i<values.length;i++){
    const row=values[i];
    if(!row||row.length===0)continue;

    const type=String(row[iType]||'').trim();
    // 유효하지 않은 행 스킵
    if(!type||type==='지출종류'||type==='expense type'||type==='부서'||type==='team')continue;

    const pv = iPlan>=0 ? num(row[iPlan]) : 0;
    const av = iActual>=0 ? num(row[iActual]) : 0;
    if(pv===0&&av===0)continue;

    // 월 파싱: "2월", "2", "2026-02-12" 등
    let month=0;
    if(iMonth>=0&&row[iMonth]){
      const ms=String(row[iMonth]).trim();
      const m1=ms.match(/(\d{4})[.\-\/](\d{1,2})/);
      if(m1) month=parseInt(m1[2]);
      else{
        const m2=ms.match(/^(\d{1,2})월?$/);
        if(m2) month=parseInt(m2[1]);
      }
    }

    rows.push({
      부서:   deptName,
      월:     month,
      지출종류: type,

// ══ 자동 새로고침 (10분) ════════════════════════
let AUTO_TIMER = null;
let CD_TIMER = null;
const AUTO_SEC = 10 * 60;

function startAutoRefresh() {
  stopAutoRefresh();
  if(API_KEY === 'sample') return;
  document.getElementById('auto-badge').style.display = 'inline';
  let rem = AUTO_SEC;
  CD_TIMER = setInterval(() => {
    rem--;
    if(rem <= 0) rem = AUTO_SEC;
    const el = document.getElementById('countdown');
    if(el) el.textContent = String(Math.floor(rem/60)).padStart(2,'0')+':'+String(rem%60).padStart(2,'0');
  }, 1000);
  AUTO_TIMER = setInterval(async () => { rem = AUTO_SEC; if(API_KEY && API_KEY!=='sample') await loadData(); }, AUTO_SEC * 1000);
}

function stopAutoRefresh() {
  if(AUTO_TIMER){ clearInterval(AUTO_TIMER); AUTO_TIMER=null; }
  if(CD_TIMER){ clearInterval(CD_TIMER); CD_TIMER=null; }
  const b=document.getElementById('auto-badge'); if(b) b.style.display='none';
}

async function refreshData(){
  if(API_KEY && API_KEY!=='sample'){
    await loadData();
    stopAutoRefresh();
    startAutoRefresh();
  }
}

function rAlerts(data){
  const w=document.getElementById('alerts-wrap');

  // 부서별 경고
  const deptItems=[];
  Object.entries(gBy(data,'부서')).forEach(([dept,rows])=>{
    const p=sum(rows,'예정원화'),a=sum(rows,'실적원화'),pp=pct(a,p);
    if(pp>100)deptItems.push({label:dept,tag:'부서',pp,diff:a-p,lv:'over'});
    else if(pp>95)deptItems.push({label:dept,tag:'부서',pp,diff:p-a,lv:'sos'});
    else if(pp>90)deptItems.push({label:dept,tag:'부서',pp,diff:p-a,lv:'warn'});
  });
  deptItems.sort((a,b)=>b.pp-a.pp);

  // 계정과목별 경고
  const typeItems=[];
  Object.entries(gBy(data,'지출종류')).forEach(([type,rows])=>{
    if(!type||type==='기타')return;
    const p=sum(rows,'예정원화'),a=sum(rows,'실적원화'),pp=pct(a,p);
    if(pp>100)typeItems.push({label:type,tag:'계정과목',pp,diff:a-p,lv:'over'});
    else if(pp>95)typeItems.push({label:type,tag:'계정과목',pp,diff:p-a,lv:'sos'});
    else if(pp>90)typeItems.push({label:type,tag:'계정과목',pp,diff:p-a,lv:'warn'});
  });
  typeItems.sort((a,b)=>b.pp-a.pp);

  const mkA=(it)=>{
    const icon=it.lv==='over'?'🚨':it.lv==='sos'?'⚠️':'⚡';
    const tc=it.tag==='부서'?'var(--accent)':'var(--teal)';
    const msg=it.lv==='over'
      ?`${LANG==='ko'?'예산':'Budget'} <strong>${it.pp.toFixed(1)}%</strong> ${LANG==='ko'?'소진 &mdash; 초과':'burned &mdash; over by'} <strong>${krw(it.diff)}</strong>`
      :it.lv==='sos'
      ?`${LANG==='ko'?'예산':'Budget'} <strong>${it.pp.toFixed(1)}%</strong> ${LANG==='ko'?'소진 &mdash; 잔여':'burned &mdash; remaining'} <strong>${krw(it.diff)}</strong> <span style="color:var(--text3)">${t('alertSosSub')}</span>`
      :`${LANG==='ko'?'예산':'Budget'} <strong>${it.pp.toFixed(1)}%</strong> ${LANG==='ko'?'소진 &mdash; 잔여':'burned &mdash; remaining'} <strong>${krw(it.diff)}</strong> <span style="color:var(--text3)">${t('alertWarnSub')}</span>`;
    return `<div class="alert a-${it.lv}" style="flex-wrap:wrap">${icon} <span style="background:${tc}22;color:${tc};border:1px solid ${tc}44;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;margin-right:6px;flex-shrink:0">${it.tag==='부서'?t('alertTagDept'):t('alertTagType')}</span><span class="a-team">[${it.label}]</span>&nbsp;${msg}</div>`;
  };

  let html='';

  if(deptItems.length>0){
    html+=`<div style="font-size:16px;font-weight:800;color:#ffffff;margin-bottom:8px;letter-spacing:-.2px">${t('alertDeptTitle')}</div>`;
    html+=deptItems.map(mkA).join('');
  }

  if(typeItems.length>0){
    html+=`<div style="font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-top:${deptItems.length?'12px':'0'};margin-bottom:5px">${t('alertTypeTitle')}</div>`;
    html+=typeItems.map(mkA).join('');
  }

  if(!deptItems.length&&!typeItems.length){
    html=`<div style="display:flex;align-items:center;gap:8px;padding:9px 14px;background:rgba(34,197,94,.06);border:1px solid rgba(34,197,94,.2);border-left:3px solid var(--green);border-radius:9px;font-size:12px;color:var(--green)">${LANG==='ko'?'✅ <strong>모든 부서 및 계정과목</strong>의 예산이 정상 범위입니다.':'✅ All departments and categories are within budget.'}</div>`;
  }

  w.innerHTML=html;
}


function rKPI(data){
  const tp=sum(data,'예정원화'),ta=sum(data,'실적원화'),rem=tp-ta;
  const un=data.filter(r=>r.월<=CUR_MONTH),pn=sum(un,'예정원화'),an=sum(un,'실적원화'),ppn=pct(an,pn);

  document.getElementById('kpi-row').innerHTML=`

    <div class="kpi ky"><div class="kpi-l">${t('kpiOverDept')}</div><div class="kpi-v"><span class="cv">${ov}</span><span style="color:var(--text2);font-size:16px"> / </span><span class="cw2">${wn}</span></div><div class="kpi-s">${t('kpiOverDeptSub')}</div></div>
    <div class="kpi kr"><div class="kpi-l">${t('kpiOverType')}</div><div class="kpi-v cv">${typeOv}</div><div class="kpi-s">${t('kpiOverTypeSub')}</div></div>

function rTable(data){
  const K=VIEW==='dept'?'부서':VIEW==='type'?'지출종류':VIEW==='entity'?'지출법인':'월';
  const ents=Object.entries(gBy(data,K)).map(([k,rows])=>({k,p:sum(rows,'예정원화'),a:sum(rows,'실적원화')})).sort((a,b)=>b.p-a.p);
  const iM=VIEW==='month';
  let h=`<thead><tr><th>${iM?t('vMonth').replace(/[📅 ]/g,''):K}</th><th>${t('colBudget')}</th><th>${t('colActual')}</th><th>${t('colDiff')}</th><th>${t('colBurn')}</th></tr></thead><tbody>`;
  for(const{k,p,a}of ents){
    const pp=pct(a,p),diff=a-p,bc=PC(pp);
    h+=`<tr class="${RCL(pp)}"><td>${iM?k+'월':k}</td><td>${Math.round(p).toLocaleString()}원</td><td>${Math.round(a).toLocaleString()}원</td><td class="${diff>0?'cn':'cp'}">${diff>0?'+':''}${Math.round(diff).toLocaleString()}원</td><td><div class="pc"><div class="pb"><div class="pf" style="width:${Math.min(pp,100)}%;background:${bc}"></div></div><span class="pn ${PCL(pp)}">${pp.toFixed(1)}%</span></div></td></tr>`;
  }
  const tp=sum(data,'예정원화'),ta=sum(data,'실적원화'),td=ta-tp,tpp=pct(ta,tp);
  h+=`<tr style="background:var(--surface2);font-weight:700"><td>${t('colTotal')}</td><td>${Math.round(tp).toLocaleString()}원</td><td>${Math.round(ta).toLocaleString()}원</td><td class="${td>0?'cn':'cp'}">${td>0?'+':''}${Math.round(td).toLocaleString()}원</td><td><div class="pc"><div class="pb"><div class="pf" style="width:${Math.min(tpp,100)}%;background:${PC(tpp)}"></div></div><span class="pn ${PCL(tpp)}">${tpp.toFixed(1)}%</span></div></td></tr></tbody>`;
  document.getElementById('main-table').innerHTML=h;
}


document.addEventListener('DOMContentLoaded',()=>{
  try{ const s=localStorage.getItem('3i_api_key'); if(s) document.getElementById('inp-key').value=s; }catch(e){}
});
</script>
